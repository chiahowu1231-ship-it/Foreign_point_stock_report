name: 外資分點狙擊分析 (TW 18:00)

on:
  schedule:
    - cron: "0 10 * * 1-5"
  workflow_dispatch: {}

# ── 權限：Pages 發布需要 ────────────────────────────
permissions:
  contents: read
  pages:    write
  id-token: write

# ── 並發鎖：避免重複觸發 ────────────────────────────
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

# ── 強制所有 JS Actions 用 Node 24（消除 Node 20 deprecation 警告）─
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ════════════════════════════════════════════════
  #  Job 1: 產生報表、寄 Email、建立 Pages artifact
  # ════════════════════════════════════════════════
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      TZ: Asia/Taipei
      DAYS: "5"
      TOP_N: "10"
      DEBUG_HTML: "1"

      # ✅ 大盤籌碼抓取
      MARKET_DATA: "1"
      MARKET_HISTORY_DAYS: "6"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 產生 Excel/PDF + 大盤籌碼資料 ────────────
      - name: Generate Excel/PDF + market data (DAYS=5)
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python src/run_report.py

      # ── Gemini AI 分析 ───────────────────────────
      - name: Gemini analysis (v9 + market context)
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-2.5-pro"
          GEMINI_TEMPERATURE: "0.3"
          PROMPT_TOP_BROKERS: "7"
          PROMPT_TOP_STOCKS: "7"
          GEMINI_RETRIES: "3"
          GEMINI_RETRY_BASE_SLEEP: "2.0"
          GEMINI_ENABLE_FIXUP: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          python src/ai_analyze_gemini.py

      # ── 驗證 AI 分析 ────────────────────────────
      - name: Verify Gemini analysis (safe)
        if: always()
        run: |
          python - <<'PY'
          import json
          with open("output/summary.json", "r", encoding="utf-8") as f:
              s = json.load(f)
          t = s.get("ai_analysis", "") or ""
          print("ai_model =", s.get("ai_model"))
          print("ai_analyzer_version =", s.get("ai_analyzer_version"))
          print("ai_analysis_chars =", len(t))
          print("ai_analysis_lines =", len(t.splitlines()))

          md = s.get("market_data", {})
          print(f"market_data: inst={len(md.get('institutional',[]))}, "
                f"taiex={len(md.get('taiex',[]))}, "
                f"margin={len(md.get('margin',[]))}, "
                f"futures={len(md.get('futures',[]))}, "
                f"tdcc={len(md.get('tdcc',[]))}")
          errs = md.get("fetch_errors", [])
          if errs:
              print(f"market fetch_errors: {errs}")

          if "失敗" in t or "error" in t.lower():
              print("⚠️ AI 分析包含錯誤訊息")
          else:
              print("✅ AI 分析正常")
          PY

      # ── 🆕 建立 GitHub Pages 靜態網頁 ─────────────
      - name: Build GitHub Pages site
        if: always()
        run: |
          python src/build_site.py

      # ── 🆕 設定 Pages（需 Repo Settings 已啟用） ──
      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5
        with:
          enablement: true   # 第一次執行時自動啟用 Pages（之後可移除）

      # ── 🆕 上傳 site/ 為 Pages artifact ─────────
      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      # ── 上傳 Actions artifacts（保留原有功能）──
      - name: Upload report artifacts (auto expire)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: foreign-report
          path: |
            output/*.xlsx
            output/*.pdf
            output/summary.json
            output/ai_analysis.txt
            output/debug/*.html
          retention-days: 7
          if-no-files-found: warn

      # ── 建立信件主旨並推導 Pages URL ────────────
      - name: Build mail subject + Pages URL
        if: always()
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPO_OWNER="${GITHUB_REPOSITORY%%/*}"
          REPORT_DATE="$(TZ=Asia/Taipei date +'%Y-%m-%d')"
          ACTUAL_TIME="$(TZ=Asia/Taipei date +'%H:%M')"
          PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/"
          echo "MAIL_SUBJECT=【外資分點狙擊分析】${REPORT_DATE} ${ACTUAL_TIME}（TW）${REPO_NAME}" >> $GITHUB_ENV
          echo "PAGES_URL=${PAGES_URL}" >> $GITHUB_ENV
          echo "🌐 Pages URL: ${PAGES_URL}"

      # ── 寄送 Email（一定執行） ─────────────────
      - name: Send email (always)
        if: always()
        env:
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM:  ${{ secrets.MAIL_FROM }}
          MAIL_TO:    ${{ secrets.MAIL_TO }}
          MAIL_BCC:   ${{ secrets.MAIL_BCC }}
          MAIL_SUBJECT: ${{ env.MAIL_SUBJECT }}
          PAGES_URL:    ${{ env.PAGES_URL }}
        run: |
          python src/mailer.py

  # ════════════════════════════════════════════════
  #  Job 2: 發布 GitHub Pages（接在 Job 1 之後）
  # ════════════════════════════════════════════════
  deploy-pages:
    needs: report
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Print Pages URL
        run: |
          echo "🌐 GitHub Pages 部署完成："
          echo "   ${{ steps.deploy.outputs.page_url }}"
