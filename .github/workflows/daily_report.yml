name: 外資分點狙擊分析 (TW 14:30)

on:
  schedule:
    # 台灣 14:30 = UTC 06:30；週一～週五
    - cron: "30 6 * * 1-5"
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest

    env:
      # 提前用 Node24 跑 JavaScript actions，提早驗證相容性
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      TZ: Asia/Taipei
      DAYS: "5"
      TOP_N: "10"
      DEBUG_HTML: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 方案 A：run_report exit code 非 0 仍繼續後面 steps
      - name: Generate Excel/PDF (DAYS=5)
        continue-on-error: true
        run: |
          python src/run_report.py

      # Gemini 3.1 Pro Preview：官方 model code gemini-3.1-pro-preview [1](https://www.datastudios.org/post/gemini-token-limits-and-context-windows)[2](https://futureagi.com/blogs/google-gemini-2-5-pro-2025)
      # 輸出不限制：刻意不設定 GEMINI_MAX_OUTPUT_TOKENS，讓 ai_analyze_gemini.py 不送 maxOutputTokens
      - name: Gemini analysis (gemini-3.1-pro-preview, no maxOutputTokens)
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-3.1-pro-preview"
          GEMINI_TEMPERATURE: "0.2"
        run: |
          python src/ai_analyze_gemini.py

      # 你要求的 safe 驗證：檢查 ai_analysis 長度與行數（不洩漏敏感資訊）[5](https://www.datastudios.org/post/google-gemini-context-window-token-limits-model-comparison-and-workflow-strategies-for-late-2025)
      - name: Verify Gemini analysis length (safe)
        if: always()
        run: |
          python - <<'PY'
          import json
          p = "output/summary.json"
          with open(p, "r", encoding="utf-8") as f:
              s = json.load(f)
          t = s.get("ai_analysis", "") or ""
          print("ai_provider =", s.get("ai_provider"))
          print("ai_model =", s.get("ai_model"))
          print("ai_analyzer_version =", s.get("ai_analyzer_version"))
          print("ai_max_output_tokens_used =", s.get("ai_max_output_tokens_used"))
          print("ai_analysis_len_chars =", len(t))
          print("ai_analysis_lines =", len(t.splitlines()))
          PY

      - name: Upload artifacts (auto expire)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: foreign-report
          path: |
            output/*.xlsx
            output/*.pdf
            output/summary.json
            output/ai_analysis.txt
            output/debug/*.html
          retention-days: 7
          if-no-files-found: warn

      - name: Build mail subject (Asia/Taipei yyyy-mm-dd)
        if: always()
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPORT_DATE="$(TZ=Asia/Taipei date +'%Y-%m-%d')"
          echo "MAIL_SUBJECT=【外資分點狙擊分析】${REPORT_DATE}（TW 14:30）${REPO_NAME}" >> $GITHUB_ENV

      - name: Send email (always)
        if: always()
        env:
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM:  ${{ secrets.MAIL_FROM }}
          MAIL_TO:    ${{ secrets.MAIL_TO }}
          MAIL_BCC:   ${{ secrets.MAIL_BCC }}
          MAIL_SUBJECT: ${{ env.MAIL_SUBJECT }}
        run: |
          python src/mailer.py
