name: 外資分點狙擊分析 (TW 14:30)

on:
  schedule:
    # 台灣 14:30 = UTC 06:30；週一～週五
    - cron: "30 6 * * 1-5"
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest

    env:
      # 提前用 Node24 跑 JavaScript actions，提早發現相容性問題
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      TZ: Asia/Taipei
      DAYS: "5"
      TOP_N: "10"
      DEBUG_HTML: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 方案 A：run_report 結束碼非 0 仍繼續後面步驟（artifacts / Gemini / email）
      - name: Generate Excel/PDF (DAYS=5)
        continue-on-error: true
        run: |
          python src/run_report.py

      - name: Gemini analysis
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-2.5-flash"
          GEMINI_MAX_OUTPUT_TOKENS: "1400"
        run: |
          python src/ai_analyze_gemini.py

      # ✅ 你要求新增：確認 Gemini 分析輸出長度（safe，不會洩漏敏感資訊）
      - name: Verify Gemini analysis length (safe)
        if: always()
        run: |
          python - <<'PY'
          import json
          p = "output/summary.json"
          with open(p, "r", encoding="utf-8") as f:
              s = json.load(f)
          t = s.get("ai_analysis", "") or ""
          print("ai_provider =", s.get("ai_provider"))
          print("ai_model =", s.get("ai_model"))
          print("ai_analysis_len_chars =", len(t))
          print("ai_analysis_lines =", len(t.splitlines()))
          PY

      - name: Upload artifacts (auto expire)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: foreign-report
          path: |
            output/*.xlsx
            output/*.pdf
            output/summary.json
            output/ai_analysis.txt
            output/debug/*.html
          retention-days: 7
          if-no-files-found: warn

      - name: Build mail subject (Asia/Taipei yyyy-mm-dd)
        if: always()
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPORT_DATE="$(TZ=Asia/Taipei date +'%Y-%m-%d')"
          echo "MAIL_SUBJECT=【外資分點狙擊分析】${REPORT_DATE}（TW 14:30）${REPO_NAME}" >> $GITHUB_ENV

      - name: Send email (always)
        if: always()
        env:
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM:  ${{ secrets.MAIL_FROM }}
          MAIL_TO:    ${{ secrets.MAIL_TO }}
          MAIL_BCC:   ${{ secrets.MAIL_BCC }}
          MAIL_SUBJECT: ${{ env.MAIL_SUBJECT }}
        run: |
          python src/mailer.py
