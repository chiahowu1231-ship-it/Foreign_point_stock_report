name: 外資分點狙擊分析 (TW 14:30)

on:
  schedule:
    # 台灣 14:30 = UTC 06:30；週一～週五
    - cron: "30 6 * * 1-5"
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TZ: Asia/Taipei
      DAYS: "5"
      TOP_N: "10"
      DEBUG_HTML: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 方案 A：run_report 即使 exit 1 也不中斷後續 steps
      - name: Generate Excel/PDF (DAYS=5)
        continue-on-error: true
        run: |
          python src/run_report.py

      - name: Gemini analysis
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-2.5-flash"
          GEMINI_MAX_OUTPUT_TOKENS: "1400"
        run: |
          python src/ai_analyze_gemini.py

      # ✅ 兩個安全驗證：確保 ai_analysis 真的進 summary、mailer 真的有讀 ai_analysis
      - name: Verify summary has ai_analysis (safe)
        if: always()
        run: |
          python - <<'PY'
          import json
          p="output/summary.json"
          s=json.load(open(p,"r",encoding="utf-8"))
          print("has_ai_analysis =", "ai_analysis" in s, "len =", len(s.get("ai_analysis","")))
          print("ai_provider =", s.get("ai_provider"))
          PY

      - name: Verify mailer has AI block (safe)
        if: always()
        run: |
          grep -n "ai_analysis" src/mailer.py || true
          grep -n "【AI 分析】" src/mailer.py || true

      - name: Upload artifacts (auto expire)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: foreign-report
          path: |
            output/*.xlsx
            output/*.pdf
            output/summary.json
            output/ai_analysis.txt
            output/debug/*.html
          retention-days: 7
          if-no-files-found: warn

      - name: Build mail subject (Asia/Taipei yyyy-mm-dd)
        if: always()
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPORT_DATE="$(TZ=Asia/Taipei date +'%Y-%m-%d')"
          echo "MAIL_SUBJECT=【外資分點狙擊分析】${REPORT_DATE}（TW 14:30）${REPO_NAME}" >> $GITHUB_ENV

      - name: Send email (always)
        if: always()
        env:
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM:  ${{ secrets.MAIL_FROM }}
          MAIL_TO:    ${{ secrets.MAIL_TO }}
          MAIL_BCC:   ${{ secrets.MAIL_BCC }}
          MAIL_SUBJECT: ${{ env.MAIL_SUBJECT }}
        run: |
          python src/mailer.py
