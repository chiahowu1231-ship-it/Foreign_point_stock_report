name: 外資分點狙擊分析 (TW 14:30)

on:
  schedule:
    # 台灣 14:30 = UTC 06:30；週一～週五
    - cron: "30 6 * * 1-5"
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TZ: Asia/Taipei
      DAYS: "5"
      TOP_N: "10"
      DEBUG_HTML: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 方案 A：run_report exit code 非 0 仍繼續後面 steps（artifacts / Gemini / email）
      - name: Generate Excel/PDF (DAYS=5)
        continue-on-error: true
        run: |
          python src/run_report.py

      # ✅ 改成 Gemini 2.5 Pro（你要試的模型）[1](https://docs.cloud.google.com/vertex-ai/generative-ai/docs/model-reference/inference)
      # Gemini API generateContent + x-goog-api-key 為官方標準驗證/呼叫方式[2](https://ai.google.dev/gemini-api/docs/models/gemini-3.1-flash-lite-preview)[3](https://futureagi.com/blogs/google-gemini-2-5-pro-2025)
      - name: Gemini analysis (gemini-2.5-pro + retries)
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-2.5-pro"
          GEMINI_TEMPERATURE: "0.2"

          # ✅ retries env：避免偶發 429/5xx（需你的 ai_analyze_gemini.py 內有讀取這兩個 env）
          GEMINI_RETRIES: "5"
          GEMINI_RETRY_BASE_SLEEP: "2.0"

          # 若你要固定輸出長度，可解除註解（不設表示由腳本決定是否送 maxOutputTokens）
          # GEMINI_MAX_OUTPUT_TOKENS: "1400"
        run: |
          python src/ai_analyze_gemini.py

      # ✅ safe verify：確認 ai_analysis 寫入了多少字/多少行（不洩漏敏感資訊）
      - name: Verify Gemini analysis length (safe)
        if: always()
        run: |
          python - <<'PY'
          import json
          p = "output/summary.json"
          with open(p, "r", encoding="utf-8") as f:
              s = json.load(f)
          t = s.get("ai_analysis", "") or ""
          print("ai_provider =", s.get("ai_provider"))
          print("ai_model =", s.get("ai_model"))
          print("ai_analyzer_version =", s.get("ai_analyzer_version"))
          print("ai_max_output_tokens_used =", s.get("ai_max_output_tokens_used"))
          print("ai_analysis_len_chars =", len(t))
          print("ai_analysis_lines =", len(t.splitlines()))
          PY

      # （可選，但我很建議）確保 mailer 是新版且包含 AI 區塊
      - name: Verify mailer has AI block (safe)
        if: always()
        run: |
          echo "== grep ai_analysis in src/mailer.py =="
          grep -n "ai_analysis" src/mailer.py || true
          echo "== grep AI marker in src/mailer.py =="
          grep -n "【AI 分析】" src/mailer.py || true

      - name: Upload artifacts (auto expire)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: foreign-report
          path: |
            output/*.xlsx
            output/*.pdf
            output/summary.json
            output/ai_analysis.txt
            output/debug/*.html
          retention-days: 7
          if-no-files-found: warn

      - name: Build mail subject (Asia/Taipei yyyy-mm-dd)
        if: always()
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPORT_DATE="$(TZ=Asia/Taipei date +'%Y-%m-%d')"
          echo "MAIL_SUBJECT=【外資分點狙擊分析】${REPORT_DATE}（TW 14:30）${REPO_NAME}" >> $GITHUB_ENV

      - name: Send email (always)
        if: always()
        env:
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM:  ${{ secrets.MAIL_FROM }}
          MAIL_TO:    ${{ secrets.MAIL_TO }}
          MAIL_BCC:   ${{ secrets.MAIL_BCC }}
          MAIL_SUBJECT: ${{ env.MAIL_SUBJECT }}
        run: |
          python src/mailer.py
